<div class="auth-card">
  <h1>Nouveau mot de passe</h1>
  <p class="subtitle">Veuillez définir votre nouveau mot de passe sécurisé.</p>

  <form class="auth-form" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="password">Nouveau mot de passe</label>
      <input type="password" id="password" formControlName="password" placeholder="Min. 8 caractères">
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Retapez le mot de passe">
    </div>

    <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isLoading()">
      {{ isLoading() ? 'Validation...' : 'Mettre à jour' }}
    </button>
  </form>
</div>
