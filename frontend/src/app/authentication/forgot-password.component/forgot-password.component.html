<div class="auth-card">
  <h1>Mot de passe oublié</h1>
  <p class="subtitle">Entrez l'adresse email associée à votre compte pour recevoir un lien de réinitialisation.</p>

  <form class="auth-form" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="email">Adresse email</label>
      <input type="email" id="email" formControlName="email" placeholder="jean.dupont@exemple.com" autocomplete="email">
    </div>

    <button type="submit" class="btn-primary" [disabled]="forgotForm.invalid || isLoading()">
      {{ isLoading() ? 'Envoi en cours...' : 'Envoyer le lien' }}
    </button>
  </form>

  <div class="auth-links">
    <a routerLink="/login">← Retour à la connexion</a>
  </div>
</div>
